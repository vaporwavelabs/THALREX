<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thalrex StockOracle</title>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
        "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
        "@babylonjs/core": "https://aistudiocdn.com/@babylonjs/core@^7.0.0"
      }
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=VT323&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #111;
        font-family: 'Chakra Petch', sans-serif;
      }

      /* Screen Texture - The Orange Fabric/Pixel Look */
      .screen-texture {
        background-color: #e08031;
        background-image: 
          linear-gradient(rgba(0,0,0,0.1) 50%, transparent 50%),
          linear-gradient(90deg, rgba(0,0,0,0.1) 50%, transparent 50%);
        background-size: 4px 4px;
        box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
      }
      
      /* The Perforated Metal Grille */
      .grille-pattern {
        background-color: #1f2226;
        background-image: radial-gradient(#000 30%, transparent 31%);
        background-size: 6px 6px;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.1);
      }

      /* Skeuomorphic Knob Shadow */
      .knob-shadow {
        box-shadow: 
          0 10px 15px -3px rgba(0, 0, 0, 0.5),
          0 4px 6px -2px rgba(0, 0, 0, 0.3),
          inset 0 -4px 4px rgba(0,0,0,0.2),
          inset 0 2px 4px rgba(255,255,255,0.2);
      }

      /* Pad Button Active State */
      .pad-btn:active {
        transform: scale(0.98);
        box-shadow: inset 0 4px 8px rgba(0,0,0,0.6);
      }
      
      /* Scrollbar for the orange screen */
      .retro-scroll::-webkit-scrollbar {
        width: 8px;
      }
      .retro-scroll::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.1); 
      }
      .retro-scroll::-webkit-scrollbar-thumb {
        background: rgba(40,40,40,0.5); 
        border-radius: 4px;
      }
      .retro-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(0,0,0,0.8); 
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
